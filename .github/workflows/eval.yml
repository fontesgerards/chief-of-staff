name: eval

# Note: engine/** already covers the three engine plugin.json manifests; the
# extra paths below are the repo-guard inputs (U3) living outside engine/.
on:
  push:
    branches: ["**"]
    paths:
      - "engine/**"
      - ".github/workflows/eval.yml"
      - ".cursor-plugin/marketplace.json"
      - "CLAUDE.md"
      - "AGENTS.md"
  pull_request:
    paths:
      - "engine/**"
      - ".github/workflows/eval.yml"
      - ".cursor-plugin/marketplace.json"
      - "CLAUDE.md"
      - "AGENTS.md"

jobs:
  structural:
    name: structural eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: pip install -r engine/eval/requirements.txt

      - name: Run structural eval (all scenarios)
        run: python3 engine/eval/run_all.py

      - name: Run unit + integration tests (outward-action gate, lib)
        run: python3 -m pytest engine/eval -q
